version: "3.8"

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0-alpine
    container_name: secrets-rotation-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretsmanager123
      MONGO_INITDB_DATABASE: secrets-rotation-manager
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - secrets-network

  # Secrets Rotation Manager API
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secrets-rotation-app
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://admin:secretsmanager123@mongodb:27017/secrets-rotation-manager?authSource=admin
      ENCRYPTION_KEY: your_secure_encryption_key_min_32_chars_long
      PORT: 5000
      BACKUP_DIR: /app/backups
      LOG_DIR: /app/logs
    volumes:
      - ./scripts:/app/scripts
      - ./backups:/app/backups
      - ./logs:/app/logs
      - ./rotation-policies:/app/rotation-policies
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: curl --fail http://localhost:5000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - secrets-network
    restart: unless-stopped

# Named volumes
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

# Networks
networks:
  secrets-network:
    driver: bridge
