name: Deploy to Production

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
      
      - name: Build Docker image
        run: docker build -t secrets-rotation-manager:latest -t secrets-rotation-manager:${{ github.sha }} .
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Push Docker image
        run: |
          docker push secrets-rotation-manager:latest
          docker push secrets-rotation-manager:${{ github.sha }}
      
      - name: Deploy to production
        run: |
          echo "Deployment script would run here"
          echo "Update your deployment configuration in .github/workflows/deploy.yml"
